name: DevTrail-CI

trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  vsixDir: '$(Build.ArtifactStagingDirectory)'

stages:
- stage: Build
  jobs:
  - job: BuildAndPackage
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: npm ci
      displayName: 'Install dependencies'

    - script: npm run build
      displayName: 'Build (webpack)'

    - task: TfxInstaller@4
      inputs:
        version: 'v0.x'
      displayName: 'Install tfx-cli'

    - task: PackageAzureDevOpsExtension@4
      inputs:
        rootFolder: '$(System.DefaultWorkingDirectory)'
        outputPath: '$(vsixDir)'
      displayName: 'Package .vsix'

    - publish: '$(vsixDir)'
      artifact: vsix
      displayName: 'Publish pipeline artifact'

- stage: Publish
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: PublishToMarketplace
    environment: 'marketplace'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: TfxInstaller@4
            inputs:
              version: 'v0.x'
          - download: current
            artifact: vsix
          - task: PublishAzureDevOpsExtension@4
            inputs:
              connectTo: 'VsTeam'
              connectedServiceName: 'marketplace-connection'
              fileType: 'vsix'
              vsixFile: '$(Pipeline.Workspace)/vsix/*.vsix'
            displayName: 'Publish to Marketplace'

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

- script: npm ci
  displayName: 'Install dependencies'

- script: npm run build
  displayName: 'Build (webpack)'

- task: TfxInstaller@4
  inputs:
    version: 'v0.x'
  displayName: 'Install tfx-cli'

- task: PackageAzureDevOpsExtension@4
  inputs:
    rootFolder: '$(System.DefaultWorkingDirectory)'
    outputPath: '$(Build.ArtifactStagingDirectory)/devtrail.vsix'
  displayName: 'Package .vsix'

- publish: '$(Build.ArtifactStagingDirectory)'
  artifact: vsix
  displayName: 'Publish pipeline artifact'